  dart_jsonwebtoken: ^2.12.0
  
  # Utilitaires
  uuid: ^4.2.1
  dotenv: ^4.2.0
  logging: ^1.2.0
  path: ^1.8.3
  mime: ^1.0.4
  
  # Email
  mailer: ^6.0.1
  http: ^1.1.0
  
  # Images
  image: ^4.1.3

dev_dependencies:
  test: ^1.24.0