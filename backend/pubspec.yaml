# backend/pubspec.yaml - Version stable avec Shelf uniquement
name: procolis_backend
version: 1.0.0
description: PRO COLIS Backend API

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  # Framework web
  shelf: ^1.4.0
  shelf_router: ^1.1.3
  shelf_cors_headers: ^0.1.5
  shelf_static: ^1.1.0
  shelf_multipart: ^2.0.1
  
  # Base de données
