# backend/fly.toml
app = "pro-colis"
primary_region = "cdg"

[build]
  # Utiliser le buildpack Dart
  builder = "heroku/buildpacks:20"
  buildpacks = ["https://github.com/heroku/heroku-buildpack-dart.git"]

[env]
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
  
  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true
  
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443